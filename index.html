<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de servidores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <header class="text-center mb-5 mt-4">
        <h1 class="fw-bold text-primary">TechSpecs Manager</h1>
    </header>

    <main class="container my-5 flex-grow-1">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm p-4">
                    <h3 class="h5 mb-3 text-secondary">Nuevo servidor</h3>
                    <form id="serverForm">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre servidor</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="cpu" class="form-label">CPU</label>
                            <input type="number" min="2" class="form-control" id="cpu" required>
                        </div>
                        <div class="mb-3">
                            <label for="ram" class="form-label">RAM</label>
                            <input type="number" min="4" class="form-control" id="ram" required>
                        </div>
                        <div class="mb-3">
                            <label for="almacenamiento" class="form-label">Almacenamiento</label>
                            <select class="form-select" id="almacenamiento" required>
                                <option value="" disabled selected>Selecciona tipo almacenamiento...</option>
                                <option value="HDD">HDD</option>
                                <option value="SSD">SSD</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="presupuesto" class="form-label">Presupuesto (€)</label>
                            <input type="number" min="1" max="700" class="form-control" id="presupuesto" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Registrar</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <h3 class="h5 mb-3 text-secondary">Registro servidores </h3>
                <div id="listaServidores" class="row row-cols-1 row-cols-md-2 g-3"></div>
            </div>
        </div>
    </main>

    <footer class="custom-footer py-3">
        <p class="mb-0">&copy; 2026 TechSpecs Manager. Todos los derechos reservados.</p>

    </footer>


    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
